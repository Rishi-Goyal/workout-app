name: Android — Production Release

# Builds a SIGNED RELEASE APK and publishes it to GitHub Releases.
# Release = no Metro, Hermes optimised, resource shrinking, R8/ProGuard minified.
# Triggered by pushing a version tag: git tag v1.2.0 && git push origin v1.2.0

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      notes:
        description: "Extra release notes (optional)"
        required: false
        default: ""

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build:
    name: Signed release APK (production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install JS dependencies
        run: npm ci

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Build signed release APK ──────────────────────────────────────────
      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          APP_ENV: production
          EXPO_PUBLIC_OPENAI_API_KEY: ${{ secrets.EXPO_PUBLIC_OPENAI_API_KEY }}
          # Keystore secrets — add these in Settings → Secrets → Actions
          # Run scripts/generate-keystore.sh locally to create the keystore
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS:       ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD:  ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD:    ${{ secrets.ANDROID_KEY_PASSWORD }}

      # ── Rename & publish ──────────────────────────────────────────────────
      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          SRC="android/app/build/outputs/apk/release/app-release.apk"
          DST="android/app/build/outputs/apk/release/DungeonFit-${VERSION}.apk"
          mv "$SRC" "$DST"
          echo "APK_PATH=$DST"  >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: DungeonFit-${{ env.VERSION }}-release
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "DungeonFit ${{ env.VERSION }}"
          files: ${{ env.APK_PATH }}
          generate_release_notes: true
          body: |
            ## DungeonFit ${{ env.VERSION }} — Production Release

            ${{ github.event.inputs.notes }}

            ### What's new
            See the full changelog above ↑

            ### Install on Android
            1. Download **DungeonFit-${{ env.VERSION }}.apk** below
            2. On your device: **Settings → Apps → Install unknown apps** → allow your browser or Files app
            3. Open the downloaded APK and tap **Install**

            > **Signed release build** — no Metro dev overlay, Hermes optimised JS, ProGuard minified.
